<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isekai Adventure</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button id="mute-btn" title="Mute / unmute music">🔊</button>
    <div id="game-container">
      <!-- Cover / title screen, shown before the story begins. -->
      <div id="cover-screen">
        <img id="cover-img" src="assets/cover.webp" alt="Isekai Adventure cover" />
        <div id="cover-overlay">
          <h1 id="cover-title">Isekai Adventure</h1>
          <p id="cover-tagline">Awaken in a world that wants you dead.</p>
          <button id="begin-btn">Begin Adventure</button>
          <p id="cover-author">by ChangDaze</p>
        </div>
      </div>
      <div id="page">
        <img id="scene-image" src="" alt="Scene Visual" />
        <div id="text-container">Loading...</div>
        <div id="choices-container"></div>
      </div>
    </div>

    <script src="scene.js"></script>
    <script src="game.js"></script>
  </body>
</html>
